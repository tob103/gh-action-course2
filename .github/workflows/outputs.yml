name: Outputs and Artifacts Workflow 
on: [workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code 
        uses: actions/checkout@v6
      - name: Install Node
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci 
        working-directory: artifacts-outputs
      - name: Lint code
        run: npm run lint
        working-directory: artifacts-outputs
      - name: Run tests
        run: npm test
        working-directory: artifacts-outputs
  build: 
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Get code 
        uses: actions/checkout@v6
      - name: Install dependencies
        run: npm ci 
        working-directory: artifacts-outputs
      - name: Build project
        run: npm run build
        working-directory: artifacts-outputs
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with: 
          name: dist-files
          path: |
           artifacts-outputs/dist
           artifacts-outputs/package.json 
    
  deploy: 
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to production
        run: echo "Deploying to production..."      